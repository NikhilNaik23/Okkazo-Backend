server:
  port: 8081
  tomcat:
    max-part-count: 50

spring:
  application:
    name: auth-service

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB        # Maximum size per file
      max-request-size: 50MB    # Maximum size for entire request (multiple files)
      file-size-threshold: 0    # Files written to disk immediately

  datasource:
    url: jdbc:postgresql://localhost:5433/okkazo_auth_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  Kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: java.util.HashMap

Kafka:
    topic:
        name: ${KAFKA_TOPIC_NAME:auth_events}
    admin-topic:
        name: ${KAFKA_ADMIN_TOPIC_NAME:admin_events}

jwt:
  secret: ${JWT_SECRET:your-default-secret-key-change-this-in-production}
  access-token:
      expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token:
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloudinary-cloud-name}
  api-key: ${CLOUDINARY_API_KEY:your-cloudinary-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:your-cloudinary-api-secret}
  folder: ${CLOUDINARY_FOLDER:okkazo/vendor-documents}

admin:
  promote-key: ${ADMIN_PROMOTE_KEY:okkazo-admin-secret-2026}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}